<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WILDCARD — the classic card game</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="theme-color" content="#123026" />

      rel="preload"
      href="./fonts/Fraunces.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      /* Self-hosted display face — zero external requests. Variable roman

      @font-face {
        font-family: 'Fraunces';
        font-style: normal;
        font-weight: 400 900;
        font-display: swap;
        src: url('./fonts/Fraunces.woff2') format('woff2');
      }
    </style>
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
